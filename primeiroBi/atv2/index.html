<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 2</title>
</head>
<body>
    <form>
        <h1>Formulário de Cadastro</h1>
        <fieldset>
            <legend>Crie sua conta</legend>
            <br>
            <label for="nome">Nome</label><br>
            <input type="text" name="nome" id="nome" >
            <br><br>
            <label for="email">Email</label> <br>
            <input type="email" name="email" id="email">
            <br><br>
            <label for="senha">Senha</label><br>
            <input type="password" name="senha" id="senha" maxlength="8">
            <br><br>
            <input type="radio" name="genero" id="masculino" value="masculino" >
            <label for="masculino">Masculino</label>
            <br>
            <input type="radio" name="genero" id="feminino" value="feminino">
            <label for="feminino">Feminino</label>
            <br>
            <input type="radio" name="genero" id="outro" value="outro">
            <label for="outro">Outro</label>
            <br><br>
            <label for="biografia">Biografia</label>
            <br>
            <textarea name="biografia" id="biografia" placeholder="digite sua biografia" rows="2"></textarea>
        <br>
        <label for="termos">
            <input type="checkbox" name="termos" id="termos" required>
            Concordo com os <a href="#" target="_blank">termos de uso</a>
        </label>
        <br><br>
        </fieldset>
        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
    </form>
</body>
</html>
